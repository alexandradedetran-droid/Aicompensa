kind = "web"
previewPath = "/"
title = "Comparador de Preços"
version = "1.0.0"
id = "artifacts/comparador-precos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19668

[services.development]
run = "pnpm --filter @workspace/comparador-precos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/comparador-precos", "run", "build" ]
publicDir = "artifacts/comparador-precos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19668"
BASE_PATH = "/"
